<script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e1e4e8;padding:24px}h1{color:#c084fc;margin-bottom:4px}h2{color:#8b949e;font-size:14px;font-weight:400;margin-bottom:24px}.stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}.stat{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px 24px;flex:1;min-width:120px}.stat .num{font-size:28px;font-weight:700;color:#c084fc}.stat .label{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}table{width:100%;border-collapse:collapse;background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}th,td{text-align:left;padding:10px 14px;border-bottom:1px solid #21262d;font-size:13px}th{background:#1c2128;color:#8b949e;font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.5px}tr:hover td{background:#1c2128}.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}.badge-green{background:#1a3a2a;color:#3fb950}.badge-red{background:#3a1a1a;color:#f85149}.btn{border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:600}.btn-danger{background:#3a1a1a;color:#f85149}.btn-danger:hover{background:#5c1a1a}.btn-warning{background:#3a2a1a;color:#d29922}.btn-warning:hover{background:#5c3a1a}.btn-primary{background:#3a1a5a;color:#c084fc}.btn-primary:hover{background:#4a1a6a}.btn-subtle{background:#21262d;color:#8b949e;margin-left:4px}.btn-subtle:hover{background:#30363d}.btn-success{background:#1a3a2a;color:#3fb950}.btn-success:hover{background:#1a4a2a}.empty{text-align:center;padding:48px;color:#8b949e}.login-box{max-width:400px;margin:80px auto;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:32px;text-align:center}.login-box input{width:100%;padding:10px;margin:12px 0;background:#0f1117;border:1px solid #30363d;color:#e1e4e8;border-radius:6px;font-size:14px}.login-box input:focus{outline:none;border-color:#c084fc}.gen-box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:24px}.gen-box h3{color:#c084fc;font-size:14px;margin-bottom:12px}.gen-box .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}.gen-box input{padding:8px 12px;background:#0f1117;border:1px solid #30363d;color:#e1e4e8;border-radius:6px;font-size:13px}.gen-box input:focus{outline:none;border-color:#c084fc}.gen-box label{font-size:11px;color:#8b949e;display:block;margin-bottom:4px}.gen-result{margin-top:12px;padding:12px;background:#1a3a2a;border:1px solid #3fb95040;border-radius:6px}.gen-result code{font-size:12px;color:#3fb950;word-break:break-all}.error{color:#f85149;font-size:13px;margin:8px 0}.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;display:none}.toast.show{display:block}.toast.success{background:#1a3a2a;color:#3fb950;border:1px solid #3fb95040}.toast.error{background:#3a1a1a;color:#f85149;border:1px solid #f8514940}</style>
</head><body>
<div id="toast" class="toast"></div>
<div id="login-view"><h1>ClauSync License Admin</h1>
<div class="login-box">
<div id="login-box-inner"><h2 style="margin-bottom:16px">Admin Login</h2>
<input type="password" id="password-input" placeholder="Enter admin password" autofocus>
<div id="login-error" class="error" style="display:none"></div>
<button class="btn btn-primary" onclick="login()" style="width:100%;padding:10px;font-size:14px">Login</button></div>
<div id="setup-box" style="display:none"><h2 style="margin-bottom:16px">First-Time Setup</h2>
<p style="font-size:13px;color:#8b949e;margin-bottom:16px">Create an admin password.</p>
<input type="password" id="setup-password" placeholder="New admin password (6+ chars)">
<input type="password" id="setup-confirm" placeholder="Confirm password">
<div id="setup-error" class="error" style="display:none"></div>
<button class="btn btn-success" onclick="setup()" style="width:100%;padding:10px;font-size:14px">Set Up Admin</button></div></div></div>
<div id="dashboard-view" style="display:none">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h1>ClauSync License Admin</h1>
<button class="btn btn-subtle" onclick="logout()">Log out</button></div>
<h2>Standalone · Keys stored in this browser</h2>
<div class="stats"><div class="stat"><div class="num" id="stat-total">0</div><div class="label">Total</div></div>
<div class="stat"><div class="num" id="stat-active">0</div><div class="label">Active</div></div>
<div class="stat"><div class="num" id="stat-revoked">0</div><div class="label">Revoked</div></div></div>
<div class="gen-box"><h3>Generate License</h3>
<div class="row"><div><label>User</label><input type="text" id="gen-user" placeholder="user@email.com"></div>
<div><label>Expiry (days)</label><input type="number" id="gen-expiry" placeholder="365" min="1" style="width:120px"></div>
<div><button class="btn btn-success" onclick="generateLicense()" style="padding:8px 20px">Generate</button></div></div>
<div id="gen-error" class="error" style="display:none;margin-top:8px"></div>
<div id="gen-result" class="gen-result" style="display:none"><code id="gen-key-text"></code>
<button class="btn btn-subtle" onclick="copyGenKey()" style="margin-top:8px">Copy</button></div></div>
<table><thead><tr><th>Key</th><th>User</th><th>Created</th><th>Expires</th><th>Status</th><th>Action</th></tr></thead>
<tbody id="licenses-body"><tr><td class="empty" colspan="6">No keys.</td></tr></tbody></table></div>
<script>
const PK='_bTP14wYLFq5lqH5n2s7oNq1mCTZ91RGSh-cgJ1lqGQ',SK='8K7SAqHkqigeLQhiTbDfyMTYOg7eSkVofJwPQgHRmj0',PX='CLAUSYNC-',SK_S='ausync_admin_licenses',PW_K='ausync_admin_password';
let tt;function st(m,t){const e=document.getElementById('toast');e.textContent=m;e.className='toast '+t+' show';clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),3000)}
function b64u(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
function fb64(s){const p=s.replace(/-/g,'+').replace(/_/g,'/');const pad=p.length%4;return Uint8Array.from(atob(pad?p+'==='.slice(pad):p),c=>c.charCodeAt(0))}
function gl(){try{return JSON.parse(localStorage.getItem(SK_S))||[]}catch{return[]}}
function sl(l){localStorage.setItem(SK_S,JSON.stringify(l))}
function setup(){const p=document.getElementById('setup-password').value,c=document.getElementById('setup-confirm').value,e=document.getElementById('setup-error');e.style.display='none';if(p!==c){e.textContent='Passwords do not match';e.style.display='block';return}if(p.length<6){e.textContent='Password must be at least 6 characters';e.style.display='block';return}localStorage.setItem(PW_K,btoa(p));sd()}
function login(){const p=document.getElementById('password-input').value,e=document.getElementById('login-error');e.style.display='none';const s=localStorage.getItem(PW_K);if(!s){e.textContent='Not set up';e.style.display='block';return}if(btoa(p)!==s){e.textContent='Invalid password';e.style.display='block';return}sd()}
function logout(){document.getElementById('dashboard-view').style.display='none';document.getElementById('login-view').style.display='block';document.getElementById('password-input').value=''}
function sd(){document.getElementById('login-view').style.display='none';document.getElementById('dashboard-view').style.display='block';rt();us()}
function us(){const l=gl();document.getElementById('stat-total').textContent=l.length;document.getElementById('stat-active').textContent=l.filter(x=>!x.revoked).length;document.getElementById('stat-revoked').textContent=l.filter(x=>x.revoked).length}
function rt(){const b=document.getElementById('licenses-body'),l=gl();if(!l.length){b.innerHTML='<tr><td class="empty" colspan="6">No keys.</td></tr>';return}
b.innerHTML=l.map((x,i)=>{const r=x.revoked;return '<tr><td style="font-family:monospace;font-size:11px" title="'+x.key+'">'+(x.key.length>48?x.key.substring(0,48)+'...':x.key)+'</td><td>'+x.user+'</td><td>'+x.issued+'</td><td>'+(x.expires||'Never')+'</td><td>'+(r?'<span class="badge badge-red">Revoked</span>':'<span class="badge badge-green">Active</span>')+'</td><td><button class="btn '+(r?'btn-warning':'btn-danger')+'" onclick="tr('+i+')">'+(r?'Reactivate':'Revoke')+'</button></td></tr>'}).join('')}
function tr(i){const l=gl();const x=l[i];if(!x.revoked){if(!confirm('Revoke?'))return;x.revoked=true;x.revoked_at=new Date().toISOString()}else{if(!confirm('Reactivate?'))return;x.revoked=false;x.revoked_at=null}l[i]=x;sl(l);rt();us();st(x.revoked?'Revoked':'Reactivated','success')}
function generateLicense(){const u=document.getElementById('gen-user').value.trim(),e=document.getElementById('gen-expiry').value,r=document.getElementById('gen-error'),s=document.getElementById('gen-result');r.style.display='none';s.style.display='none';if(!u){r.textContent='User required';r.style.display='block';return}
try{const seed=fb64(SK),kp=nacl.sign.keyPair.fromSeed(seed),uid=Array.from({length:8},()=>Math.floor(Math.random()*256).toString(16).padStart(2,'0').toUpperCase()).join(''),now=Math.floor(Date.now()/1000),exp=e?now+parseInt(e)*86400:null,pl={uid:uid,sub:u,iat:now,exp:exp,fea:['all']},pb=new TextEncoder().encode(JSON.stringify(pl)),sig=nacl.sign.detached(pb,kp.secretKey),cl=new Uint8Array(64+pb.length);cl.set(sig,0);cl.set(pb,64);const key=PX+b64u(cl),ia=new Date().toISOString().replace('T',' ').substring(0,19)+' UTC',ea=exp?new Date(exp*1000).toISOString().replace('T',' ').substring(0,19)+' UTC':null;const ls=gl();ls.unshift({key:key,user:u,issued:ia,expires:ea||'Never',revoked:false,revoked_at:null});sl(ls);document.getElementById('gen-key-text').textContent=key;s.style.display='block';st('Generated!','success');document.getElementById('gen-user').value='';document.getElementById('gen-expiry').value='';rt();us()}catch(ex){r.textContent='Error: '+ex.message;r.style.display='block'}}
function copyGenKey(){navigator.clipboard.writeText(document.getElementById('gen-key-text').textContent);st('Copied!','success')}
(function(){const s=localStorage.getItem(PW_K);if(s){document.getElementById('setup-box').style.display='none';document.getElementById('login-box-inner').style.display='block'}else{document.getElementById('login-box-inner').style.display='none';document.getElementById('setup-box').style.display='block'}
document.getElementById('password-input').addEventListener('keydown',function(e){if(e.key==='Enter')login()})})();
</script>
