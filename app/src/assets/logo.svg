<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aGrad" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6ED7FF"/>
      <stop offset="35%" stop-color="#28C7FF"/>
      <stop offset="100%" stop-color="#5A4CFF"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.38" r="0.42">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="c"><rect width="512" height="512" rx="128"/></clipPath>
  </defs>

  <rect width="512" height="512" rx="128" fill="#0B1020"/>
  <rect width="512" height="512" rx="128" fill="url(#shine)" clip-path="url(#c)"/>
  <rect width="512" height="512" rx="128" fill="url(#glow)" clip-path="url(#c)"/>

  <!--
    One continuous ribbon:
    Apex → left leg → bottom → crossbar → right leg → sync arrow arc → arrowhead
  -->
  <g stroke="url(#aGrad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="
      M 256 88
      L 144 324
      C 140 340, 152 350, 168 350
      L 252 350
      L 228 274
      L 284 274
      L 276 324
      L 360 324
      C 400 324, 416 350, 416 376
      C 416 402, 398 418, 368 418
      C 344 418, 330 404, 330 382
    "/>
  </g>

  <!-- Arrowhead pointing right (tip right, base left) -->
  <polygon points="330,366 330,398 354,382" fill="url(#aGrad)"/>
</svg>
